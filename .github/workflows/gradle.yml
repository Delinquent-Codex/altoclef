name: Fabric 26.2 Build

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build
        run: ./gradlew clean build --warning-mode all

      - name: Write SHA-256 hashes
        run: |
          mkdir -p build/artifact-hashes
          find build/libs -maxdepth 1 -name '*.jar' -print0 | sort -z | xargs -0 sha256sum > build/artifact-hashes/sha256.txt

      - name: Upload Fabric 26.2 jars
        uses: actions/upload-artifact@v4
        with:
          name: altoclef-fabric-26.2
          path: |
            build/libs/altoclef-*+mc26.2.jar
            build/libs/altoclef-*+mc26.2-sources.jar
            build/artifact-hashes/sha256.txt

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: altoclef-26.2-test-reports
          path: |
            build/reports/tests/
            build/test-results/
          if-no-files-found: ignore
